<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
</head>
<style>
     *{
        box-sizing: border-box;
        font-family: sans-serif;
     }
     body{
        background: url('blinkit image/Login-page3.jpg');
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0px;
        padding: 10px;
        display: flex;
     }
     .login-container{
        border: 2px solid rgb(203, 200, 200);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0px 0px 15px rgba(24, 20, 20, 0.1); 
        width: 400px;
        background-color: rgb(205, 208, 207);
     }
     .login-container h2{
        /* border: 2px solid rgb(224, 210, 210); */
        text-align: center;
        margin-top: 30px;
     }

    .login-container input[type="text"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border:1.5px solid #cbc2c2;
      border-radius: 10px;
    }
    .login-container button{
        width: 100%;
        margin:18px;
        background-color: transparent;
        border: none;
        font-size: 16px;   
        cursor: pointer;
        margin-top: 20px;
        border-radius: 8px;
       padding-right:50px ;
       align-items: center;
    }
    
    .login-container .link {
      text-align: center;
      margin-top: 15px;
      font-size: 16px;
    }

    .login-container .link a {
      color: #1f9433;
      text-decoration: none;
    }

    .login-container .link a:hover {
      text-decoration: underline;
    }

</style>
<body>

  <div class="login-container">
    <h2>Login</h2>
    <form>
      <input type="text" placeholder="name">  
      <input type="text" placeholder="Username or Email" required>
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Repeat your Password" required>
      <button type="submit">Register</button>
    </form>
    <div class="link">
      You have an account? <a href="LoginPage.html">Login</a>
    </div>
  </div>

</body>
</html>
